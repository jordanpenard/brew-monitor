{% extends "master.html" %}

{% block title %}Edit Project{% endblock %}

{% block content %}
<div class="container">
    <h1>Edit Project: {{ project.name }}</h1>
    <form method="post" class="d-inline">
        {% csrf_token %}
        <div class="mb-3">
            <label for="name" class="form-label">Project Name</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ project.name }}" required>
        </div>
        <div class="mb-3">
            <label for="owner" class="form-label">Owner</label>
            <select class="form-select" id="owner" name="owner" required>
                {% for user in users %}
                <option value="{{ user.id }}" {% if user == project.owner %}selected{% endif %}>{{ user.username }}</option>
                {% endfor %}
            </select>
        </div>
        <button type="submit" class="btn btn-primary me-5">Save Changes</button>
        <a href="{% url 'project_list' %}" class="btn btn-secondary me-5">Cancel</a>
    </form>
    {% if request.user == project.owner %}
    <form action="{% url 'delete_project' project.id %}" method="post" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger me-5" onclick="return confirm('Are you sure you want to delete this project?');">Delete</button>
    </form>
    {% endif %}
</div>
{% endblock %}
