{% extends 'master.html' %}
{% block title %}Login{% endblock title %}
{% block content %}
<br><br>
<div class="box text-center" style="margin: auto; max-width: 360px; padding: 30px; background-color: #f8f9fa; border-radius: .25rem; border: 1px solid rgba(0,0,0,.125);">
    <form method="POST">
        {% csrf_token %}
        <h3 class="mb-3 font-weight-normal">Please sign-in</h3>

        <input class="form-control mb-3" type="text" name="username" id="username" placeholder="Username" autofocus="" required>
        <input class="form-control mb-3" type="password" name="password" id="password" placeholder="Password" required>

        <div class="form-check mb-3" style="width: fit-content; margin: auto;">
            <input class="form-check-input" type="checkbox" name="remember_me" id="remember_me" value="true">
            <label class="form-check-label" for="remember_me">Remember me</label>
        </div>
        <button class="btn btn-lg btn-primary btn-block" type="submit" style="width: 100%;">Login</button>
    </form>
</div>
{% endblock content %}
